# Everforest Dark Hard — Hyprland border colors
# source this file from hyprland.conf:
#   source = ~/.config/hypr/colors.conf

general {
    col.active_border   = rgb(83c092)
    col.inactive_border = rgba(595959aa)
}

decoration {
    active_opacity   = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled      = true
        range        = 8
        render_power = 3
        color        = rgba(83c092aa)
    }

    blur {
        enabled   = true
        size      = 4
        passes    = 2
        vibrancy  = 0.1696
    }
}
