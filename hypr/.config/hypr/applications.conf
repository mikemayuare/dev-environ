# Main apps
$terminal = GTK_IM_MODULE=simple ghostty
$fileManager = cosmic-files
# $menu = hyprlauncher
# $menu = rofi -show drun
$menu = ~/.config/rofi/launchers/app_drawer.sh || pkill rofi
$browser = zen-browser
$browser_incognito = zen-browser --private-window
$browser_tor = brave --tor

# Autostart apps
# app: waybar, swaync, hypridle, hyprsunset, hyprpaper
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = dbus-update-activation-environment --all
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent
exec-once = waybar
exec-once = swaync
exec-once = hypridle
exec-once = hyprsunset
exec-once = hyprpaper
exec-once = pipewire
exec-once = pipewire-pulse
exec-once = wireplumber
exec-once = wl-paste --watch cliphist store
exec-once = flatpak run com.nextcloud.desktopclient.nextcloud --background
