# Main apps
$terminal = GTK_IM_MODULE=simple ghostty
$fileManager = cosmic-files
# $menu = hyprlauncher
# $menu = rofi -show drun
$menu = ~/.config/rofi/launchers/type-3/launcher.sh || pkill rofi
$browser = uwsm app brave
$browser_incognito = uwsm app -- brave --incognito


# Autostart apps
# all are nadled by uwsm: systemctl --user enable --now {app}.service
# app: waybar, swaync, hypridle, hyprsunset, hyprpaper
exec-once = arch-update -c
