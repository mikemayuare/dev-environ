
# -----------------------------------------------------
# HYPRLOCK — blurred wallpaper placeholder
# -----------------------------------------------------
general {
    ignore_empty_input = true
    disable_loading_bar = false
    grace = 2
    hide_cursor = false
}


# Use current wallpaper (from hyprpaper or swww)
background {
    monitor =
    path = /home/migue/Pictures/wallpapers/2-dusk-guardian.jpg
    blur_passes = 2
    blur_size = 4
    noise = 0.02
    contrast = 1.1
    brightness = 0.9
    vibrancy = 0.2
}

# -----------------------------------------------------
# Clock
# -----------------------------------------------------
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    font_size = 96
    font_family = Iosevka Nerd Font Mono
    color = rgba(255,255,255,1.0)

    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%A, %d %B"
    font_size = 26
    font_family = Iosevka Nerd Font Mono
    color = rgba(255,255,255,1.0)

    position = 0, 40
    halign = center
    valign = center
}

label {
    monitor =
    font_family = Iosevka Nerd Font Propo
    text = 󰌌 $LAYOUT[en,intl]
    font_size = 16
    onclick = hyprctl switchxkblayout all next

    position = 0, -140
    halign = center
    valign = center
}

# -----------------------------------------------------
# Password input field
# -----------------------------------------------------
input-field {
    monitor =
    size = 320, 55
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(255,255,255,0.25)
    # inner_color = rgba(0,0,0,0.35)
    inner_color = rgba(0,0,0,0.25)
    font_family = Iosevka Nerd Font Mono
    font_color = rgba(255,255,255,1.0)

    fade_on_empty = false
    placeholder_text = <i>Enter password</i>

    position = 0, -80
    halign = center
    valign = center
    rounding = 0
}

# -----------------------------------------------------
# Status text
# -----------------------------------------------------
label {
    monitor =
    text = Hi $USER 
    font_size = 20
    font_family = Iosevka Nerd Font Propo

    position = 0, 240
    halign = center
    valign = center
}

