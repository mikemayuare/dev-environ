
# -----------------------------------------------------
# HYPRLOCK — blurred wallpaper placeholder
# -----------------------------------------------------

# Use current wallpaper (from hyprpaper or swww)
background {
    monitor =
    path = ~/Images/a_group_of_tall_buildings_with_cartoon_characters_on_them.jpg
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 1.1
    brightness = 0.9
    vibrancy = 0.2
}

# -----------------------------------------------------
# Clock
# -----------------------------------------------------
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    font_size = 96
    font_family = Sans
    color = rgba(255,255,255,1.0)

    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%A, %d %B"
    font_size = 26
    font_family = Sans
    color = rgba(220,220,220,1.0)

    position = 0, 40
    halign = center
    valign = center
}

# -----------------------------------------------------
# Password input field
# -----------------------------------------------------
input-field {
    monitor =
    size = 320, 55
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(255,255,255,0.25)
    inner_color = rgba(0,0,0,0.35)
    font_color = rgba(255,255,255,1.0)

    fade_on_empty = false
    placeholder_text = <i>Enter password</i>

    position = 0, -80
    halign = center
    valign = center
}

