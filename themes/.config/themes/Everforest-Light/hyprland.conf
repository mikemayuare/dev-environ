# Everforest Light Hard — Hyprland border colors
# source this file from hyprland.conf:
#   source = ~/.config/hypr/colors.conf

general {
    col.active_border   = rgb(8da101)
    col.inactive_border = rgba(cfc9b4aa)
}

decoration {
    active_opacity   = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled      = true
        range        = 8
        render_power = 3
        color        = rgba(8da101aa)
    }

    blur {
        enabled  = true
        size     = 4
        passes   = 2
        vibrancy = 0.1696
    }
}
