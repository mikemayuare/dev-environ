# Osaka Jade — Hyprland border colors
# source this file from hyprland.conf:
#   source = ~/.config/themes/current-hyprland.conf

general {
    col.active_border   = rgb(2DD5B7)
    col.inactive_border = rgba(595959aa)
}

decoration {
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 8
        render_power = 3
        color = rgba(2DD5B7aa)
    }

    blur {
        enabled = true
        size = 4
        passes = 2
        vibrancy = 0.1696
    }
}
