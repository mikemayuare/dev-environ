# Rosé Pine Dawn — Hyprland border colors
# source this file from hyprland.conf:
#   source = ~/.config/themes/current-hyprland.conf

general {
    col.active_border   = rgb(907aa9)
    col.inactive_border = rgba(9893a566)
}

decoration {
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 8
        render_power = 3
        color = rgba(907aa966)
    }

    blur {
        enabled = true
        size = 4
        passes = 2
        vibrancy = 0.1696
    }
}
