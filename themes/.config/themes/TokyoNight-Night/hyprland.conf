# Tokyo Night — Hyprland border colors
general {
    col.active_border   = rgb(7aa2f7)
    col.inactive_border = rgba(595959aa)
}

decoration {
    # rounding = 6
    # rounding_power = 3

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 8
        render_power = 3
        color = rgba(7aa2f7aa)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 4
        passes = 2
        vibrancy = 0.1696
    }
}


