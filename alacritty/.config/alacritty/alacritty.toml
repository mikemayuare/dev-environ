[env]
TERM = "xterm-256color"

[font]
normal = { family = "Iosevka Nerd Font Mono" }
bold = { family = "Iosevka Nerd Font Mono" }
italic = { family = "Iosevka Nerd Font Mono" }
size = 16

[window]
padding.x = 16
padding.y = 16
decorations = "None"
opacity = 0.95

[general]
live_config_reload = true
import = ["current-theme.toml"]
